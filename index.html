<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王蓓奕 | 运营 · IP · 设计</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&display=swap');
        body { font-family: 'Noto Serif SC', serif; background-color: #f8f9fa; }
        
        /* 盲盒悬浮效果 */
        .blind-box {
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .blind-box:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        /* 模拟“炸开”的覆盖层 */
        .detail-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.98);
            z-index: 100;
            padding: 40px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="text-gray-800">

    <header class="min-h-screen flex flex-col items-center justify-center text-center px-4 relative overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-50 via-white to-pink-50 -z-10"></div>
        
        <div class="mb-8 w-32 h-32 md:w-40 md:h-40 rounded-full border-4 border-white shadow-2xl overflow-hidden">
            <img src="https://via.placeholder.com/150" alt="王蓓奕" class="w-full h-full object-cover">
        </div>

        <h1 class="text-4xl md:text-6xl font-light mb-4 tracking-widest text-gray-900">运营 · IP · 设计</h1>
        <p class="text-lg text-gray-500 max-w-2xl leading-relaxed mb-8">
            热爱内容创作与视觉设计，专注于账号运营、IP形象设计与创意视觉呈现
        </p>

        <div class="flex flex-wrap justify-center gap-3">
            <span class="px-4 py-1 border border-gray-200 rounded-full text-sm text-gray-400">爆款内容</span>
            <span class="px-4 py-1 border border-gray-200 rounded-full text-sm text-gray-400">IP设计</span>
            <span class="px-4 py-1 border border-gray-200 rounded-full text-sm text-gray-400">视觉创意</span>
        </div>
    </header>

    <section class="py-20 max-w-6xl mx-auto px-4">
        <h2 class="text-center text-3xl font-light mb-16 tracking-widest">作品集柜</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <div class="blind-box bg-white p-8 rounded-2xl border border-gray-100 text-center relative overflow-hidden group" onclick="showDetail('operation')">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-100 transition-opacity">📦</div>
                <div class="w-16 h-16 bg-blue-50 text-blue-400 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">✨</div>
                <h3 class="text-2xl font-light mb-3">账号运营</h3>
                <p class="text-sm text-gray-400">小红书 · 爆款 · 公众号</p>
                <div class="mt-6 text-xs text-blue-400 opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Click to Unbox</div>
            </div>

            <div class="blind-box bg-white p-8 rounded-2xl border border-gray-100 text-center relative overflow-hidden group" onclick="showDetail('ip')">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-100 transition-opacity">📦</div>
                <div class="w-16 h-16 bg-pink-50 text-pink-400 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">🎨</div>
                <h3 class="text-2xl font-light mb-3">IP设计</h3>
                <p class="text-sm text-gray-400">Logo · 角色 · 表情包</p>
                <div class="mt-6 text-xs text-pink-400 opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Click to Unbox</div>
            </div>

            <div class="blind-box bg-white p-8 rounded-2xl border border-gray-100 text-center relative overflow-hidden group" onclick="showDetail('design')">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-100 transition-opacity">📦</div>
                <div class="w-16 h-16 bg-gray-50 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">🖋️</div>
                <h3 class="text-2xl font-light mb-3">设计作品</h3>
                <p class="text-sm text-gray-400">海报 · 摄影 · 绘画</p>
                <div class="mt-6 text-xs text-gray-400 opacity-0 group-hover:opacity-100 uppercase tracking-tighter">Click to Unbox</div>
            </div>
        </div>
    </section>

    <div id="overlay" class="detail-overlay">
        <button onclick="closeDetail()" class="fixed top-10 right-10 text-3xl font-light">&times; CLOSE</button>
        <div id="detail-content" class="max-w-4xl mx-auto pt-20">
            </div>
    </div>

    <script>
        const details = {
            operation: `
                <h2 class="text-4xl font-light mb-8">账号运营详情</h2>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="p-6 bg-gray-50 rounded-xl text-center">
                        <div class="text-3xl font-serif text-blue-500">20,000+</div>
                        <div class="text-sm text-gray-400">HBC小红书曝光</div>
                    </div>
                    <div class="p-6 bg-gray-50 rounded-xl text-center">
                        <div class="text-3xl font-serif text-blue-500">1,000+</div>
                        <div class="text-sm text-gray-400">单篇获赞</div>
                    </div>
                </div>
                <p class="text-gray-500 leading-loose">这里可以放入你在 HBC 实习时的战报长图...</p>
            `,
            ip: `
                <h2 class="text-4xl font-light mb-8">IP 设计详情</h2>
                <div class="aspect-video bg-pink-50 rounded-2xl mb-8 flex items-center justify-center text-pink-200">
                    [ 放入栗子君三视图 ]
                </div>
                <p class="text-gray-500 leading-loose">这里详细介绍成都理工大学官方 IP 的诞生过程...</p>
            `,
            design: `
                <h2 class="text-4xl font-light mb-8">设计实验室</h2>
                <p class="text-gray-500 leading-loose">这里展示你的绘画原画和时尚芭莎获奖作品...</p>
            `
        };

        function showDetail(type) {
            document.getElementById('detail-content').innerHTML = details[type];
            document.getElementById('overlay').style.display = 'block';
            document.body.style.overflow = 'hidden'; // 禁止底页滚动
        }

        function closeDetail() {
            document.getElementById('overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
